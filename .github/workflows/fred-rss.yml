name: Build FRED RSS Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install requests

      - run: python generate_fred_rss.py
        env:
          FRED_API_KEY: ${{ secrets.FED_API_KEY }}

      - run: |
          echo '<!doctype html><html><body><h1>FRED RSS Feed</h1><p><a href="./feed.xml">feed.xml</a></p></body></html>' > public/index.html
          touch public/.nojekyll
          ls -la public

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
